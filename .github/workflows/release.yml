name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag v1.2.0 && git push origin v1.2.0
# The tag (minus the leading "v") becomes the app's display version.
on:
  push:
    tags:
      - "v*"

# Required so the workflow can create the GitHub Release and upload assets.
permissions:
  contents: write

env:
  # The single Windows target framework from "Mendix Tools.csproj".
  WINDOWS_TFM: net10.0-windows10.0.19041.0
  RUNTIME_ID: win10-x64
  PROJECT: "Mendix Tools.csproj"

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        shell: pwsh
        # v1.2.0 -> 1.2.0 (ApplicationDisplayVersion).
        # ApplicationVersion must be an integer; use the monotonic run number.
        run: |
          $display = "${{ github.ref_name }}".TrimStart("v")
          "display=$display" >> $env:GITHUB_OUTPUT
          "build=${{ github.run_number }}" >> $env:GITHUB_OUTPUT
          Write-Host "Releasing display=$display build=${{ github.run_number }}"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore
        run: dotnet restore "${{ env.PROJECT }}"

      - name: Publish (unpackaged Windows)
        shell: pwsh
        # WindowsPackageType=None is already set in the csproj, so this produces
        # a self-contained folder of loose files (the .exe + dependencies).
        run: |
          dotnet publish "${{ env.PROJECT }}" `
            -c Release `
            -f ${{ env.WINDOWS_TFM }} `
            -p:RuntimeIdentifierOverride=${{ env.RUNTIME_ID }} `
            -p:ApplicationDisplayVersion=${{ steps.version.outputs.display }} `
            -p:ApplicationVersion=${{ steps.version.outputs.build }} `
            -o publish/windows

      - name: Zip artifact
        shell: pwsh
        run: |
          $zip = "MendixTools-${{ steps.version.outputs.display }}-win-x64.zip"
          Compress-Archive -Path publish/windows/* -DestinationPath $zip -Force
          "ASSET=$zip" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # generate_release_notes builds the changelog from commits/PRs since
          # the previous tag automatically — nothing to maintain by hand.
          generate_release_notes: true
          files: ${{ env.ASSET }}

  # --- Future: macOS (MacCatalyst) ---------------------------------------
  # When you want Mac builds, uncomment and finish this job. It needs an Apple
  # signing certificate + provisioning profile in repo secrets before the
  # published .app/.pkg will run on other machines.
