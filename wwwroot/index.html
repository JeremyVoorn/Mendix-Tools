<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Mendix Tools</title>
    <base href="/" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="Mendix Tools.styles.css" />
    <link rel="icon" href="data:,">

    <!-- MT-07: apply the persisted theme synchronously, before first paint, to avoid a
         light->dark flash on start. Mirrors ThemeService's MAUI-Preferences choice into
         localStorage; light = no attribute (matches :root). -->
    <script>
        (function () {
            try {
                if (localStorage.getItem('mxt-theme') === 'dark') {
                    document.documentElement.setAttribute('data-theme', 'dark');
                }
            } catch (e) { /* storage disabled — Preferences still applies at boot */ }
        })();
    </script>
</head>

<body>

    <div class="status-bar-safe-area"></div>

    <div id="app">Loading...</div>

    <div id="blazor-error-ui" data-nosnippet>
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="_framework/blazor.webview.js" autostart="false"></script>

</body>

</html>
